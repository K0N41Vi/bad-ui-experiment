<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>アンケート</title>
<style>
body {
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;

  background-color: #000;
}

.container {
  width: 400px;
  min-height: 300px;
  padding: 20px;
  border: 1px solid #ccc;
  border-radius: 10px;
  text-align: center;

  background-color: #fff;
}
.screen {
  display: none;
  width: 100%;
  height: 100%;
}

.active {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

h3 {
  font-size: 24px; /* 少し小さく */
  margin-bottom: 30px;
}

label {
  font-size: 17px; /* 少し小さく */
  display: block;
  margin: 10px 0;
}

select {
  font-size: 16px; /* 少し小さく */
  padding: 10px;
  margin-top: 10px;
}

button {
  margin-top: 40px;
  padding: 15px;
  font-size: 16px; /* 少し小さく */
  width: 200px;

  /* 中央寄せ修正 */
  display: block;
  margin-left: auto;
  margin-right: auto;
}

.complete {
  background-color: #ccc;
}

.delete {
  background-color: green;
  color: white;
  font-weight: bold;
}

#trap.active {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.trap-buttons {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
}

.trap-buttons button {
  width: auto;
  margin: 0;
} 
</style>
</head>

<body>

<div class="container">

  <!-- Q1 -->
  <div class="screen active" id="q1">
    <h3>性別を選んでください</h3>
    <label><input type="radio" name="q1"> 男性</label><br>
    <label><input type="radio" name="q1"> 女性</label><br>
    <button onclick="next(1)">次へ</button>
  </div>

  <!-- Q2 -->
  <div class="screen" id="q2">
    <h3>1日のスマホ使用時間</h3>
    <select>
      <option>1時間未満</option>
      <option>1〜3時間</option>
      <option>3〜5時間</option>
      <option>5時間以上</option>
    </select>
    <button onclick="next(2)">次へ</button>
  </div>

  <!-- Q3 -->
  <div class="screen" id="q3">
    <h3>よく使うアプリ</h3>
    <label><input type="checkbox"> YouTube</label><br>
    <label><input type="checkbox"> Instagram</label><br>
    <label><input type="checkbox"> LINE</label><br>
    <button onclick="next(3)">次へ</button>
  </div>

  <!-- Q4 -->
  <div class="screen" id="q4">
    <h3>オンラインショッピングを利用しますか？</h3>
    <label><input type="radio" name="q4"> はい</label><br>
    <label><input type="radio" name="q4"> いいえ</label><br>
    <button onclick="next(4)">次へ</button>
  </div>

  <!-- Q5 -->
  <div class="screen" id="q5">
    <h3>UIの使いやすさを重視しますか？</h3>
    <label><input type="radio" name="q5"> とても重視する</label><br>
    <label><input type="radio" name="q5"> 普通</label><br>
    <label><input type="radio" name="q5"> あまり重視しない</label><br>
    <button onclick="showTrap()">回答を確認する</button>
  </div>

<div class="screen" id="trap">
  <h3>アンケートにご協力ありがとうございました</h3>
  <p>回答を完了させてください</p>

  <div class="trap-buttons">
    <button class="complete" onclick="finish()">完了する</button>
    <button class="delete" onclick="mistake()">アンケートを削除する</button>
  </div>
</div>

</div>

<script>
function next(num) {
  document.getElementById("q" + num).classList.remove("active");
  document.getElementById("q" + (num + 1)).classList.add("active");
}

function showTrap() {
  document.getElementById("q5").classList.remove("active");
  document.getElementById("trap").classList.add("active");
}

function finish() {
  alert("送信完了しました！");
}

function mistake() {
  alert("あなたの回答はすべて削除されました");
}
</script>

</body>
</html>

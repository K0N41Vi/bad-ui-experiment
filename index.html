<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>アンケート</title>
<style>
body {
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* カード型でサイズ固定 */
.container {
  width: 400px;
  min-height: 300px;
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 20px;
  text-align: center;
}

/* 各画面 */
.screen {
  display: none;
}

/* 表示中 */
.active {
  display: block;
}

/* ボタン */
button {
  margin-top: 20px;
  padding: 10px 20px;
}

/* 罠 */
.complete {
  background-color: #ccc;
}
.delete {
  background-color: green;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <!-- Q1 -->
  <div class="screen active" id="q1">
    <h3>性別を選んでください</h3>
    <label><input type="radio" name="q1"> 男性</label><br>
    <label><input type="radio" name="q1"> 女性</label><br>
    <button onclick="next(1)">次へ</button>
  </div>

  <!-- Q2 -->
  <div class="screen" id="q2">
    <h3>1日のスマホ使用時間</h3>
    <select>
      <option>1時間未満</option>
      <option>1〜3時間</option>
      <option>3〜5時間</option>
      <option>5時間以上</option>
    </select>
    <button onclick="next(2)">次へ</button>
  </div>

  <!-- Q3 -->
  <div class="screen" id="q3">
    <h3>よく使うアプリ</h3>
    <label><input type="checkbox"> YouTube</label><br>
    <label><input type="checkbox"> Instagram</label><br>
    <label><input type="checkbox"> LINE</label><br>
    <button onclick="next(3)">次へ</button>
  </div>

  <!-- Q4 -->
  <div class="screen" id="q4">
    <h3>オンラインショッピングを利用しますか？</h3>
    <label><input type="radio" name="q4"> はい</label><br>
    <label><input type="radio" name="q4"> いいえ</label><br>
    <button onclick="next(4)">次へ</button>
  </div>

  <!-- Q5 -->
  <div class="screen" id="q5">
    <h3>UIの使いやすさを重視しますか？</h3>
    <label><input type="radio" name="q5"> とても重視する</label><br>
    <label><input type="radio" name="q5"> 普通</label><br>
    <label><input type="radio" name="q5"> あまり重視しない</label><br>
    <button onclick="showTrap()">回答を確認する</button>
  </div>

  <!-- 罠ページ -->
  <div class="screen" id="trap">
    <h3>アンケートにご協力ありがとうございました</h3>
    <p>回答を完了させてください</p>

    <button class="complete" onclick="finish()">完了する</button>
    <button class="delete" onclick="mistake()">アンケートを削除する</button>
  </div>

</div>

<script>
function next(num) {
  document.getElementById("q" + num).classList.remove("active");
  document.getElementById("q" + (num + 1)).classList.add("active");
}

function showTrap() {
  document.getElementById("q5").classList.remove("active");
  document.getElementById("trap").classList.add("active");
}

function finish() {
  alert("送信完了しました！");
}

function mistake() {
  alert("あなたの回答はすべて削除されました");
}
</script>

</body>
</html>
